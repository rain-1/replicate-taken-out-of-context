# ── Continued Pretraining: 7B on 8×A40 (48GB) ──

base_model: allenai/Olmo-3-1025-7B
tokenizer_type: AutoTokenizer

# ── Data ──
datasets:
  - path: data/1b/all.jsonl
    type: completion
    field: completion

# ── Sequence / packing ──
sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true
# NOTE: do NOT enable group_by_length with sample_packing

# ── Batch sizing ──
# Per-GPU: 4 seqs × 2048 tok = 8k tokens/step/GPU
# Global:  4 × 4 accum × 8 GPUs = 128 effective seqs/step
micro_batch_size: 4
gradient_accumulation_steps: 4

# ── Training ──
train_on_inputs: true
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 5e-5
warmup_steps: 30
max_steps: 150
weight_decay: 0.01

# ── Precision / memory ──
bf16: true
flash_attention: true
gradient_checkpointing: true

# ── DeepSpeed ZeRO Stage 2 ──
deepspeed: ds_stage2.json

# ── Logging ──
logging_steps: 10
save_strategy: steps
save_steps: 50